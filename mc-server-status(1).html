<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简花花服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .welcome-text {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .welcome-text h3 {
            font-size: 1.4em;
            margin: 20px 0 15px;
        }

        .welcome-text p {
            margin: 10px 0;
            line-height: 1.8;
            font-size: 15px;
        }

        .welcome-text .greeting {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }

        .welcome-text .thanks {
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
        }

        .welcome-text .intro {
            font-size: 1.2em;
            font-weight: bold;
            margin: 15px 0;
        }

        .welcome-text .runtime {
            color: #00ff88;
            font-weight: 500;
        }

        .welcome-text .features p {
            text-align: left;
            padding: 8px 0;
        }

        .welcome-text .features strong {
            color: #667eea;
        }

        .welcome-text .notice {
            color: #ffaa00;
            font-weight: bold;
            margin-top: 15px;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin: 25px 0;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            display: none;
        }

        .status-card.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .status-value {
            color: #fff;
            font-weight: bold;
            font-size: 16px;
        }

        .online {
            color: #00ff88;
        }

        .offline {
            color: #ff4757;
        }

        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 20px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ff4757;
            text-align: center;
            padding: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .motd {
            color: #fff;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-text">
            <h2>欢迎来到简花花服务器</h2>
            <p class="greeting">同志您好！</p>
            <p class="thanks">感谢您在许多服务器之中选择了我们</p>
            
            <hr class="divider">
            
            <p class="intro">让我自我介绍一下 我是腐竹Cathat_</p>
            <p class="runtime">这个服务器已经稳定开启一个月了</p>
            
            <hr class="divider">
            
            <h3>我们服务器的优缺点</h3>
            
            <hr class="divider">
            
            <div class="features">
                <p><strong>优点:</strong>有探险神器RTP(可以随机传送在一个地方)</p>
                <p>有问亲访友利器TPA 仅输入/tpa &lt;玩家名字&gt;就可以去到朋友那啦</p>
                <p><strong>缺点:</strong>单纯的生存服 容易无聊</p>
            </div>
            
            <hr class="divider">
            
            <p class="notice">进群之后一定要把自己的备注改成mc游戏名字</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在查询服务器状态...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="status-card" id="statusCard">
            <div class="status-item">
                <span class="status-label">服务器状态</span>
                <span class="status-value" id="serverStatus"></span>
            </div>
            <div class="status-item">
                <span class="status-label">版本</span>
                <span class="status-value" id="serverVersion"></span>
            </div>
            <div class="status-item">
                <span class="status-label">在线人数</span>
                <span class="status-value" id="players"></span>
            </div>
            <div class="status-item">
                <span class="status-label">延迟</span>
                <span class="status-value" id="ping"></span>
            </div>
            <div class="motd" id="motd"></div>
        </div>
    </div>

    <script>
        // 固定服务器地址
        const SERVER_ADDRESS = 'play.simpfun.cn';
        const SERVER_PORT = '38876';

        async function checkServer() {
            // 隐藏之前的结果
            document.getElementById('statusCard').classList.remove('active');
            document.getElementById('error').classList.remove('active');
            
            // 显示加载状态
            document.getElementById('loading').classList.add('active');

            try {
                const startTime = Date.now();
                
                // 使用mcsrvstat.us API查询服务器状态
                const response = await fetch(`https://api.mcsrvstat.us/2/${SERVER_ADDRESS}:${SERVER_PORT}`);
                const data = await response.json();
                
                const endTime = Date.now();
                const ping = endTime - startTime;

                if (data.online) {
                    displayStatus(data, ping);
                } else {
                    showError('服务器离线或无法连接');
                }
            } catch (error) {
                showError('查询失败：' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        function displayStatus(data, ping) {
            document.getElementById('serverStatus').innerHTML = '<span class="online">● 在线</span>';
            document.getElementById('serverVersion').textContent = data.version || '未知';
            document.getElementById('players').textContent = `${data.players.online} / ${data.players.max}`;
            document.getElementById('ping').textContent = ping + ' ms';
            document.getElementById('motd').textContent = data.motd ? data.motd.clean.join('\n') : '无描述';
            
            document.getElementById('statusCard').classList.add('active');
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').classList.add('active');
        }

        // 页面加载时自动查询
        window.addEventListener('load', function() {
            checkServer();
        });

        // 每40秒自动刷新
        setInterval(checkServer, 40000);
    </script>
</body>
</html>
